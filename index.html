<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Job Scout — BYOK job search</title>
    <meta
      name="description"
      content="Search public job postings with your own Firecrawl API key. Deployed on Cloudflare Pages."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,400;0,700;1,400&family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var t = localStorage.getItem('job-scout:theme')
        if (t === 'light' || t === 'dark') {
          document.documentElement.dataset.theme = t
          document.documentElement.style.colorScheme = t
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
